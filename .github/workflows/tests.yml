name: Python Application Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install lightweight dependencies required for pytest suite (mock-friendly)
        pip install fastapi uvicorn pillow pydantic pydantic-settings pinecone-client httpx python-multipart pytest pytest-asyncio

    - name: Run tests with Pytest
      env:
        USE_MOCK_EMBEDDINGS: "True"
        PINECONE_API_KEY: "mock-key-for-testing"
        PINECONE_INDEX_NAME: "sourcingplus-visual-search"
        OPENAI_API_KEY: "mock-key-for-testing"
      run: |
        python -m pytest -v
